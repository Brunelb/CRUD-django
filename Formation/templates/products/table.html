{% extends 'base.html' %}
{% block content %}

<table class="table caption-top">
  <caption>List of users</caption>
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Name</th>
      <th scope="col">Show</th>
      <th scope="col">Update</th>
      <th scope="col">Delete</th>
    </tr>
  </thead>
  <tbody>

    {% for product in obj %}
    <tr>
      <th scope="row"> {{ product.id }} </th>
      <td> {{ product.name }} </td>
      <td><a href="" class="btn btn-primary"> Show</a></td>
      <td><a href="update/{{product.id}}" class="btn btn-warning"> Update</a></td>
      <td><a href="delete/{{product.id}}" class="btn btn-danger "> Delete</a></td>
    </tr>
    {% endfor %}

  </tbody>
</table>

{% endblock %}
